name: ShopKart CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: docker build -t shopkart:latest .

      - name: Run containers
        run: docker compose up -d

      - name: Wait for containers to start
        run: sleep 15

      - name: Check containers running
        run: docker compose ps

      - name: Test web app is running
        run: curl -f http://localhost:8080 || exit 1

      - name: Show success message
        run: echo "ShopKart build and test successful!"

      - name: Stop containers
        run: docker compose down
